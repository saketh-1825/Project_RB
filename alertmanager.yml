global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'webhook-go-backend'

receivers:
  - name: 'webhook-go-backend'
    webhook_configs:
      - url: 'http://go-backend:8080/webhooks/prometheus'
        send_resolved: true